{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>{% block title %}服务器设置{% endblock %} - {{ site_brand_name|default:"野草系统" }}</title>
    <link rel="stylesheet" href="{% static 'waimai/mobile.css' %}?v=25">
</head>
<body>
<div class="site-top">
    <header class="site-header">
        <a class="site-brand" href="{% url 'server_settings' %}">⚙️ 服务器设置</a>
        <div class="site-user">{{ user.username }}</div>
    </header>
</div>
<main class="site-main" style="max-width:720px;margin:0 auto;padding:16px;">
    {% if messages %}
    <ul class="messages" style="list-style:none;padding:0;">
        {% for message in messages %}
        <li class="card" style="padding:10px 12px;margin-bottom:8px;">{{ message }}</li>
        {% endfor %}
    </ul>
    {% endif %}
    <nav style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;">
        <a class="btn btn-sm {% if section == 'index' %}btn-primary{% else %}btn-outline{% endif %}" href="{% url 'server_settings' %}">总览</a>
        <a class="btn btn-sm {% if section == 'branding' %}btn-primary{% else %}btn-outline{% endif %}" href="{% url 'server_settings_branding' %}">站点品牌</a>
        <a class="btn btn-sm {% if section == 'compliance' %}btn-primary{% else %}btn-outline{% endif %}" href="{% url 'server_settings_compliance' %}">备案信息</a>
        <a class="btn btn-sm {% if section == 'server_home' %}btn-primary{% else %}btn-outline{% endif %}" href="{% url 'server_settings_home_page' %}">服务器主页</a>
        <a class="btn btn-sm btn-outline" href="/" target="_blank" rel="noopener">预览根地址</a>
        <a class="btn btn-sm btn-outline" href="{% url 'seller_panel' %}">回店铺管理</a>
    </nav>
    {% block owner_content %}{% endblock %}
</main>
<script src="{% static 'waimai/seller_panel_fold.js' %}?v=3"></script>
<script src="{% static 'waimai/home_block_editor.js' %}?v=2"></script>
</body>
</html>
