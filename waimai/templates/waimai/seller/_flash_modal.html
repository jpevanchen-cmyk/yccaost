{# 卖家后台：操作结果弹窗（成功 / 失败） #}
{% if messages %}
<div id="seller-flash-modal" class="seller-flash-modal" role="alertdialog" aria-modal="true">
    <div class="seller-flash-backdrop"></div>
    <div class="seller-flash-box">
        {% for message in messages %}
        <div class="seller-flash-item {% if message.tags == 'error' %}is-error{% else %}is-ok{% endif %}">
            <div class="seller-flash-icon">{% if message.tags == 'error' %}⚠️{% else %}✅{% endif %}</div>
            <p class="seller-flash-text">{{ message }}</p>
        </div>
        {% endfor %}
        <button type="button" class="btn btn-block seller-flash-close" id="seller-flash-close">知道了</button>
    </div>
</div>
<script>
(function () {
    var modal = document.getElementById('seller-flash-modal');
    var btn = document.getElementById('seller-flash-close');
    if (!modal) return;
    function closeModal() { modal.style.display = 'none'; }
    if (btn) btn.addEventListener('click', closeModal);
    modal.querySelector('.seller-flash-backdrop').addEventListener('click', closeModal);
})();
</script>
{% endif %}
